[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/tune-up"
  to = "/services/review.html"
  status = 301

[[redirects]]
  from = "/services/business-tune-up.html"
  to = "/services/review.html"
  status = 301

[[redirects]]
  from = "/website"
  to = "/services/website-starter.html"
  status = 301

[[redirects]]
  from = "/how-we-help.html"
  to = "/services.html"
  status = 301
